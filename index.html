<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicamentos IOT - Hospital PRONTIL</title>
    <!-- Bibliotecas Necessárias via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-print-color-adjust: exact; 
            print-color-adjust: exact;
        }

        @media print {
            body { 
                background: white !important; 
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .print-hidden { display: none !important; }
            
            @page { 
                size: A4 portrait; 
                margin: 1cm; 
            }

            .print-container {
                width: 100% !important;
                max-width: 18cm !important; 
                margin: 0 auto !important;
                border: 1px solid #e2e8f0 !important;
                border-radius: 1rem !important;
                box-shadow: none !important;
            }
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componentes de Ícones
        const IconPill = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>;
        const IconActivity = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
        const IconSyringe = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m18 2 4 4"/><path d="m17 7 3-3"/><path d="M19 9 8.7 19.3c-.2.2-.5.3-.7.3H5v-3c0-.3.1-.5.3-.7L15.6 5"/><path d="m9 11 4 4"/><path d="m5 19-3 3"/><path d="m14 4 6 6"/></svg>;
        const IconPrinter = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconClock = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconDroplets = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7 16.3c2.2 0 4-1.8 4-4 0-3.3-4-6.3-4-6.3s-4 3-4 6.3c0 2.2 1.8 4 4 4Z"/><path d="M17 18.5c2.5 0 4.5-2 4.5-4.5 0-3.7-4.5-7.1-4.5-7.1s-4.5 3.4-4.5 7.1c0 2.5 2 4.5 4.5 4.5Z"/></svg>;
        const IconCheck = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;

        const ProntilLogo = () => (
            <svg viewBox="0 0 400 350" className="w-24 h-20" xmlns="http://www.w3.org/2000/svg">
                <rect x="120" y="20" width="160" height="40" fill="#e30613" />
                <rect x="120" y="300" width="160" height="40" fill="#e30613" />
                <rect x="20" y="80" width="100" height="180" fill="#e30613" />
                <rect x="280" y="80" width="100" height="180" fill="#e30613" />
                <path d="M160 80 V250 H280 V180 H210 V80 Z" fill="#e30613" />
                <path d="M210 80 H280 V150 H210 Z" fill="white" />
            </svg>
        );

        const App = () => {
            const [weight, setWeight] = useState(15);
            const [patientName, setPatientName] = useState('');
            const [results, setResults] = useState(null);

            const CONC = {
                ketamine: 50,    
                rocuronium: 10,  
                midazolam: 5,    
                fentanyl: 50 // mcg/ml
            };

            useEffect(() => {
                const w = parseFloat(weight);
                if (!w || w <= 0) {
                    setResults(null);
                    return;
                }

                // Cálculos de Indução
                const induction = {
                    ketamine: w / CONC.ketamine,
                    rocuronium: w / CONC.rocuronium
                };

                // Cálculos de Adrenalina
                const adrenaline = {
                    pcr: Math.min(w * 0.01, 1) / 0.1,
                    hypo: w / 10
                };

                // LÓGICA DE VELOCIDADE FIXA (1ml/h ou 5ml/h)
                const TARGET_HOURS = 12;
                const mgPerHour = 0.1 * w;
                const mcgPerHour = 1.0 * w;

                // Medicamento puro necessário por hora
                const mPurePerH = mgPerHour / CONC.midazolam;
                const fPurePerH = mcgPerHour / CONC.fentanyl;
                const totalPurePerH = mPurePerH + fPurePerH;

                let flowRate = 1.0;
                let type = 'Seringa (20ml)';
                
                // Se em 12h a droga pura ultrapassar 10ml, usamos a seringa de 60ml a 5ml/h
                if (totalPurePerH * TARGET_HOURS > 10) {
                    flowRate = 5.0;
                    type = 'Seringa (60ml)';
                }

                // O volume total é sempre fixo para durar as 12 horas na velocidade escolhida
                let targetVol = flowRate * TARGET_HOURS;

                // Segurança: Se por acaso as drogas puras forem maiores que o volume alvo (pacientes > 125kg)
                // Aumentamos o volume para caber as drogas + um mínimo de diluente
                if (totalPurePerH * TARGET_HOURS > targetVol) {
                    targetVol = Math.ceil(totalPurePerH * TARGET_HOURS + 2);
                    // Recalcula a velocidade para manter as 12 horas caso o volume tenha subido
                    flowRate = targetVol / TARGET_HOURS;
                }

                const mPure = mPurePerH * TARGET_HOURS;
                const fPure = fPurePerH * TARGET_HOURS;

                setResults({
                    induction,
                    adrenaline,
                    syringe: { 
                        mPure, 
                        fPure, 
                        totalP: mPure + fPure, 
                        duration: TARGET_HOURS, 
                        targetVol, 
                        flowRate, 
                        type, 
                        sf: Math.max(0, targetVol - (mPure + fPure)) 
                    }
                });
            }, [weight]);

            const now = new Date();
            const formattedDate = now.toLocaleDateString('pt-BR');
            const formattedTime = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', hour12: false });

            if (!results) return (
                <div className="flex h-screen items-center justify-center bg-slate-50 p-4">
                    <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-200 text-center max-w-sm">
                        <div className="flex justify-center mb-4"><ProntilLogo /></div>
                        <h2 className="text-2xl font-black text-slate-900 mb-2 uppercase italic tracking-tighter">Hospital PRONTIL</h2>
                        <p className="text-slate-600 text-sm mb-6 uppercase font-bold tracking-tight">Protocolo de Emergência IOT</p>
                        <input 
                            type="number" 
                            placeholder="Peso (kg)" 
                            className="w-full p-4 rounded-xl border-2 border-indigo-100 focus:border-indigo-600 outline-none text-center text-4xl font-black text-indigo-900 transition-all"
                            onChange={(e) => setWeight(e.target.value)} 
                            autoFocus
                        />
                    </div>
                </div>
            );

            return (
                <div className="p-2 md:p-6 print:p-0">
                    <div className="mx-auto max-w-3xl mb-4 flex justify-end print:hidden">
                        <button onClick={() => window.print()} className="flex items-center gap-2 rounded-xl bg-indigo-600 px-5 py-2.5 text-sm font-bold text-white shadow-lg hover:bg-indigo-700 transition-all">
                            <IconPrinter /> Imprimir Protocolo
                        </button>
                    </div>

                    <div className="print-container mx-auto max-w-3xl bg-white p-6 md:p-8 rounded-[1.5rem] shadow-xl border border-slate-200 print:shadow-none print:max-w-full">
                        
                        {/* Cabeçalho */}
                        <div className="mb-6 border-b-2 border-indigo-100 pb-4 flex justify-between items-center">
                            <div className="flex items-center gap-5">
                                <ProntilLogo />
                                <div>
                                    <h1 className="text-2xl font-black text-slate-900 uppercase leading-none tracking-tight">Medicamentos IOT</h1>
                                    <p className="text-xl text-rose-600 font-black uppercase tracking-widest leading-none mt-2 italic">Hospital PRONTIL</p>
                                </div>
                            </div>
                            <div className="text-right hidden sm:block text-[14px] font-bold text-slate-800 uppercase tracking-widest">
                                {formattedDate} | {formattedTime}h
                            </div>
                        </div>

                        {/* Identificação e Peso */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                            <div className="md:col-span-3">
                                <label className="text-[10px] font-black uppercase text-slate-700 ml-1 leading-none">Identificação do Paciente</label>
                                <input 
                                    type="text" 
                                    placeholder="Nome ou prontuário" 
                                    value={patientName} 
                                    onChange={(e) => setPatientName(e.target.value)} 
                                    className="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2 text-sm font-bold text-slate-900 focus:border-indigo-400 focus:bg-white focus:outline-none print:border-b print:bg-white print:px-0" 
                                />
                            </div>
                            <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-3 flex flex-col justify-center print:border-slate-300">
                                <label className="text-[9px] font-black uppercase text-indigo-700 block mb-0.5 text-center leading-none tracking-tight">Peso (kg)</label>
                                <div className="flex items-center justify-center gap-1 leading-none">
                                    <input 
                                        type="number" 
                                        value={weight} 
                                        onChange={(e) => setWeight(e.target.value)} 
                                        className="w-12 bg-transparent text-2xl font-black text-center text-indigo-900 focus:outline-none font-mono" 
                                    />
                                    <span className="text-xs font-bold uppercase text-indigo-400">kg</span>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="space-y-6">
                                {/* 1. INDUÇÃO */}
                                <section className="bg-purple-50/40 rounded-2xl border border-purple-200 p-5 print:bg-white">
                                    <div className="flex items-center gap-2 mb-4 border-b border-purple-200 pb-2 text-purple-800"><IconPill /><h2 className="text-[11px] font-black uppercase tracking-widest">1. Indução (1 mg/kg)</h2></div>
                                    {[
                                        { name: 'Ketamina', conc: '50 mg/ml', vol: results.induction.ketamine },
                                        { name: 'Rocurônio', conc: '10 mg/ml', vol: results.induction.rocuronium }
                                    ].map((m, i) => (
                                        <div key={i} className="flex justify-between items-center border-b border-purple-100 pb-2 mb-2 last:mb-0 last:border-0">
                                            <div className="flex flex-col">
                                                <span className="text-base font-bold text-slate-900 leading-none mb-1">{m.name}</span>
                                                <span className="text-[10px] font-bold text-slate-700 uppercase tracking-tighter">{m.conc}</span>
                                            </div>
                                            <div className="text-right">
                                                <span className="text-2xl font-mono font-black text-purple-900 print:text-black">{m.vol.toFixed(2)}</span>
                                                <span className="text-[10px] ml-1 font-black text-slate-600 uppercase">ml</span>
                                            </div>
                                        </div>
                                    ))}
                                </section>

                                {/* 2. ADRENALINA */}
                                <section className="bg-rose-50/40 rounded-3xl border border-rose-200 p-5 print:bg-white">
                                    <div className="flex items-center gap-2 mb-4 border-b border-rose-200 pb-2 text-rose-800"><IconActivity /><h2 className="text-[11px] font-black uppercase tracking-widest">2. Adrenalina</h2></div>
                                    
                                    <div className="mb-5">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-[12px] font-black text-rose-900 uppercase italic tracking-tight underline underline-offset-4">PCR (0.01 mg/kg)</span>
                                            <span className="text-[9px] font-bold text-rose-700 uppercase bg-white px-2 rounded border border-rose-100">1:10.000</span>
                                        </div>
                                        <p className="text-[10px] font-bold text-slate-900 uppercase leading-none mb-3 pl-1">Diluir 1 ampola em 9 ml de SF.</p>
                                        <div className="bg-white p-2 rounded-xl border-2 border-rose-200 flex justify-between items-center shadow-sm">
                                            <span className="text-[10px] font-black text-slate-600 uppercase">Infundir:</span>
                                            <span className="text-3xl font-mono font-black text-rose-900 print:text-black">{results.adrenaline.pcr.toFixed(1)} <span className="text-xs">ml</span></span>
                                        </div>
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-[12px] font-black text-amber-900 uppercase italic tracking-tight underline underline-offset-4">Push-Dose (se Hipotensão)</span>
                                            <span className="text-[9px] font-bold text-amber-700 uppercase bg-white px-2 rounded border border-amber-100 tracking-tighter">10 mcg/ml</span>
                                        </div>
                                        <p className="text-[10px] font-bold text-slate-900 uppercase leading-none mb-3 pl-1">Diluir 1 ml da sol. de PCR em mais 9 ml de SF.</p>
                                        <div className="bg-white p-2 rounded-xl border-2 border-amber-300 flex justify-between items-center shadow-sm">
                                            <span className="text-[10px] font-black text-slate-600 uppercase">Infundir:</span>
                                            <span className="text-3xl font-mono font-black text-amber-900 print:text-black">{results.adrenaline.hypo.toFixed(1)} <span className="text-xs">ml</span></span>
                                        </div>
                                    </div>
                                </section>
                            </div>

                            {/* 3. SEDAÇÃO */}
                            <section className="bg-emerald-50/40 rounded-3xl border border-emerald-200 p-5 print:bg-white flex flex-col h-full">
                                <div className="flex items-center gap-2 mb-4 border-b border-emerald-200 pb-2 text-emerald-800"><IconSyringe /><h2 className="text-[11px] font-black uppercase tracking-widest">3. Sedação Contínua (BIC)</h2></div>
                                
                                <div className="bg-emerald-800 text-white rounded-2xl p-4 mb-6 flex justify-between items-center print:bg-white print:text-black print:border-2 print:border-emerald-600">
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-black uppercase opacity-90 tracking-wider leading-none">{results.syringe.type}</span>
                                        <span className="text-[9px] font-bold italic leading-none mt-2 italic uppercase">Duração de 12 horas</span>
                                    </div>
                                    <div className="text-right">
                                        <span className="text-[10px] font-black uppercase opacity-80 block mb-1">Ajuste Bomba</span>
                                        <span className="text-3xl font-black font-mono">{results.syringe.flowRate.toFixed(1)} <span className="text-sm uppercase">ml/h</span></span>
                                    </div>
                                </div>

                                <div className="space-y-4 flex-grow">
                                    {[
                                        { name: 'Midazolam', detail: '0.1 mg/kg/h', vol: results.syringe.mPure },
                                        { name: 'Fentanil', detail: '1 mcg/kg/h', vol: results.syringe.fPure }
                                    ].map((s, i) => (
                                        <div key={i} className="flex justify-between items-center border-b border-emerald-100 pb-3 last:border-0">
                                            <div className="flex flex-col leading-none">
                                                <span className="text-base font-bold text-slate-900 mb-1.5">{s.name}</span>
                                                <span className="text-[10px] font-bold text-slate-700 uppercase">{s.detail}</span>
                                            </div>
                                            <span className="text-2xl font-mono font-black text-emerald-900 print:text-black">{s.vol.toFixed(2)} <span className="text-[10px] text-slate-500 uppercase">ml</span></span>
                                        </div>
                                    ))}
                                    
                                    <div className="mt-4 p-4 rounded-xl border-2 border-dashed border-emerald-300 bg-white shadow-inner flex justify-between items-center">
                                        <div className="flex flex-col">
                                            <span className="text-[11px] font-black text-emerald-900 uppercase leading-none font-bold">Soro Fisiológico 0.9%</span>
                                        </div>
                                        <span className="text-3xl font-mono font-black text-emerald-800">{results.syringe.sf.toFixed(2)} <span className="text-sm">ml</span></span>
                                    </div>
                                </div>

                                <div className="mt-6 pt-3 border-t border-emerald-100 flex justify-between items-center text-slate-800 font-bold">
                                    <div className="flex items-center gap-1.5 text-[10px] font-black uppercase tracking-tighter"><IconClock /><span>Duração: {results.syringe.duration.toFixed(1)}h</span></div>
                                    <div className="flex items-center gap-1.5 text-[10px] font-black uppercase tracking-tighter"><IconDroplets /><span>Vol. Total: {results.syringe.targetVol.toFixed(1)}ml</span></div>
                                </div>
                            </section>
                        </div>

                        {/* Rodapé e Assinaturas */}
                        <div className="mt-10 pt-4 border-t-2 border-slate-100">
                            <div className="flex justify-between items-end gap-12 px-2 pb-6">
                                <div className="flex-1 border-b-2 border-slate-400 text-center pb-2 font-bold"><span className="text-[10px] font-black uppercase text-slate-800 tracking-widest leading-none">Médico Assistente</span></div>
                                <div className="flex-1 border-b-2 border-slate-400 text-center pb-2 font-bold"><span className="text-[10px] font-black uppercase text-slate-800 tracking-widest leading-none">Preparo Enfermagem</span></div>
                            </div>
                            <div className="flex items-center justify-center gap-3 opacity-100 grayscale italic font-bold text-center">
                                <IconCheck />
                                <span className="text-lg font-black uppercase text-slate-900 tracking-[0.4em]">Hospital Prontil</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
